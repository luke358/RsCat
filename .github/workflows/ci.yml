name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
          - os: windows-latest
          - os: ubuntu-24.04
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxrender-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Check format
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked
